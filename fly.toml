# fly.toml app configuration file generated for cryptoeconomy on 2026-07-02T21:37:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cryptoeconomy'
primary_region = 'jnb'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
