# Fly.io config for Mono & DIV Economy Game
# Change the app name before deploying:
# fly apps create your-app-name
# fly launch --no-deploy
# fly deploy

app = "cryptoeconomy"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 3000
    timeout = "5s"
    type = "http"
